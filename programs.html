<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختيار البرامج السياحية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #e67e22; --dark: #2c3e50; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); padding-bottom: 90px; }
        
        .main-container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .search-wrapper { margin-bottom: 30px; text-align: center; }
        .search-bar { width: 100%; max-width: 600px; padding: 14px 25px; border-radius: 30px; border: 2px solid #e0e0e0; font-size: 16px; outline: none; transition: 0.3s; }
        .search-bar:focus { border-color: var(--primary); box-shadow: 0 4px 15px rgba(230,126,34,0.1); }
        
        /* كروت برمجية محترفة بأنيميشن مرن */
        .grid-layout { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .tour-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.3s; position: relative; }
        .tour-card:hover { transform: translateY(-8px); box-shadow: 0 12px 25px rgba(0,0,0,0.12); }
        .tour-card img { width: 100%; height: 200px; object-fit: cover; }
        .card-body { padding: 20px; }
        .card-body h3 { margin: 0 0 10px 0; color: var(--dark); font-size: 18px; }
        .card-price { color: var(--primary); font-size: 20px; font-weight: bold; margin-bottom: 15px; }
        
        /* الأزرار التفاعلية */
        .btn-reserve { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn-reserve:hover { background: #d35400; }
        .fav-heart { position: absolute; left: 15px; top: 15px; background: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); color: #ccc; font-size: 18px; transition: 0.3s; }
        .fav-heart.active { color: #e74c3c; }

        /* سلة بوب آب منبثقة ممتازة للهواتف والأجهزة الكبيرة */
        .floating-cart-trigger { position: fixed; bottom: 0; left: 0; right: 0; background: var(--dark); color: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; z-index: 1000; font-weight: bold; }
        .popup-cart-panel { position: fixed; bottom: -100%; left: 0; right: 0; background: white; max-height: 75vh; overflow-y: auto; border-radius: 20px 20px 0 0; box-shadow: 0 -5px 25px rgba(0,0,0,0.2); transition: 0.4s ease-in-out; z-index: 999; padding: 25px; box-sizing: border-box; }
        .popup-cart-panel.open { bottom: 0; }
        .cart-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        .whatsapp-submit { background: #25D366; color: white; border: none; width: 100%; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; display: flex; justify-content: center; align-items: center; gap: 10px; }
    </style>
</head>
<body>

<div id="global-header-data"></div>

<div class="main-container">
    <div class="search-wrapper">
        <input type="text" id="programSearch" class="search-bar" placeholder="ابحث عن رحلتك السياحية (الأقصر، أسوان، الغردقة)..." oninput="searchTours()">
    </div>

    <div class="grid-layout" id="toursGrid"></div>
</div>

<div class="floating-cart-trigger" onclick="toggleCartView()">
    <span><i class="fas fa-suitcase-rolling"></i> البرامج المحددة (<span id="cartCount">0</span>)</span>
    <span id="cartTotal">0 ج.م</span>
</div>

<div class="popup-cart-panel" id="cartPanel">
    <h3 style="margin-top:0; border-bottom:2px solid #f1f1f1; padding-bottom:15px; color:var(--dark);">تأكيد الرحلات المحجوزة</h3>
    <div id="cartItemsContainer"></div>
    <button class="whatsapp-submit" onclick="sendBookingToWhatsApp()"><i class="fab fa-whatsapp"></i> إرسال وتأكيد عبر الواتس آب</button>
</div>

<script src="global-auth.js"></script>
<script>
    // مصفوفة البرامج المخزنة كودياً
    const tourPrograms = [
        { id: 101, title: "رحلة الأهرامات النادرة، قلعة صلاح الدين والمتحف", price: 1200, img: "https://images.unsplash.com/photo-1503177119275-0aa32b3a9368?w=500" },
        { id: 102, title: "كروز النيل الفاخر - الأقصر وأسوان 4 أيام", price: 5800, img: "https://images.unsplash.com/photo-1547989453-11e67ffb3885?w=500" },
        { id: 103, title: "مغامرات سفاري الغردقة وشواطئ الجونة الساحرة", price: 3900, img: "https://images.unsplash.com/photo-1539650116574-8efeb43e2750?w=500" }
    ];

    let cart = JSON.parse(localStorage.getItem("tourism_cart")) || [];
    let favs = JSON.parse(localStorage.getItem("tourism_favs")) || [];

    function renderTours(data) {
        const grid = document.getElementById("toursGrid");
        grid.innerHTML = "";
        data.forEach(tour => {
            const isFav = favs.includes(tour.id) ? "active" : "";
            grid.innerHTML += `
                <div class="tour-card">
                    <button class="fav-heart ${isFav}" onclick="toggleFav(${tour.id}, this)"><i class="fas fa-heart"></i></button>
                    <img src="${tour.img}" alt="${tour.title}">
                    <div class="card-body">
                        <h3>${tour.title}</h3>
                        <div class="card-price">${tour.price} ج.م</div>
                        <button class="btn-reserve" onclick="addToCart(${tour.id})">إضافة للبرنامج السياحي</button>
                    </div>
                </div>
            `;
        });
        updateCartStatus();
    }

    function searchTours() {
        const txt = document.getElementById("programSearch").value.toLowerCase();
        const filtered = tourPrograms.filter(t => t.title.toLowerCase().includes(txt));
        renderTours(filtered);
    }

    function toggleFav(id, btn) {
        if(favs.includes(id)) {
            favs = favs.filter(fId => fId !== id);
            btn.classList.remove("active");
        } else {
            favs.push(id);
            btn.classList.add("active");
        }
        localStorage.setItem("tourism_favs", JSON.stringify(favs));
    }

    function addToCart(id) {
        const item = tourPrograms.find(t => t.id === id);
        const match = cart.find(c => c.id === id);
        if(match) { match.qty += 1; } else { cart.push({...item, qty: 1, type: 'برنامج'}); }
        localStorage.setItem("tourism_cart", JSON.stringify(cart));
        updateCartStatus();
    }

    function updateCartStatus() {
        const count = cart.reduce((acc, item) => acc + item.qty, 0);
        const total = cart.reduce((acc, item) => acc + (item.price * item.qty), 0);
        document.getElementById("cartCount").innerText = count;
        document.getElementById("cartTotal").innerText = total + " ج.م";

        const list = document.getElementById("cartItemsContainer");
        list.innerHTML = "";
        cart.forEach(c => {
            list.innerHTML += `
                <div class="cart-row">
                    <span><b>${c.title}</b> (عدد: ${c.qty})</span>
                    <span>${c.price * c.qty} ج.م</span>
                </div>
            `;
        });
    }

    function toggleCartView() { document.getElementById("cartPanel").classList.toggle("open"); }

    function sendBookingToWhatsApp() {
        const client = JSON.parse(localStorage.getItem("tourism_user"));
        if(cart.length === 0) return alert("سلتك فارغة تماماً!");

        let text = `حجز جديد من موقع السياحة\nالعميل: ${client.name}\nالإيميل: ${client.email}\n\nتفاصيل الحجز المتعدد:\n`;
        cart.forEach((c, idx) => { text += `${idx+1}. ${c.title} (العدد: ${c.qty})\n`; });
        const finalPrice = cart.reduce((acc, item) => acc + (item.price * item.qty), 0);
        text += `\nإجمالي المبلغ: ${finalPrice} ج.م`;

        const waUrl = `https://wa.me/201006185776?text=${encodeURIComponent(text)}`; // ضع رقم هاتفك هنا
        window.open(waUrl, '_blank');

        // تنظيف السلة والتوجيه التلقائي لصفحة الاندكس بعد النجاح
        cart = [];
        localStorage.setItem("tourism_cart", JSON.stringify(cart));
        alert("تم تجهيز الطلب وإرساله للواتس آب. سيتم إرجاعك للصفحة الرئيسية الآن.");
        window.location.href = "index.html"; 
    }

    renderTours(tourPrograms);
</script>
</body>
</html>
